name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pages.yml'
  workflow_run:
    workflows: ["Build Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEVICE_SLUGS: "guition-esp32-p4-jc1060p470 guition-esp32-p4-jc4880p443 guition-esp32-s3-4848s040"

jobs:
  deploy-docs:
    name: Build & Deploy Docs
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Download firmware from latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for SLUG in $DEVICE_SLUGS; do
            mkdir -p "docs/.vitepress/dist/firmware/${SLUG}"
            gh release download \
              --pattern "${SLUG}.manifest.json" \
              --dir "docs/.vitepress/dist/firmware/${SLUG}/" || true
            if [ -f "docs/.vitepress/dist/firmware/${SLUG}/${SLUG}.manifest.json" ]; then
              mv "docs/.vitepress/dist/firmware/${SLUG}/${SLUG}.manifest.json" \
                 "docs/.vitepress/dist/firmware/${SLUG}/manifest.json"
            fi
            gh release download \
              --pattern "${SLUG}.factory.bin" \
              --dir "docs/.vitepress/dist/firmware/${SLUG}/" || true
            gh release download \
              --pattern "${SLUG}.ota.bin" \
              --dir "docs/.vitepress/dist/firmware/${SLUG}/" || true
          done

      - name: Download firmware from latest pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BETA_TAG=$(gh release list --limit 20 --json tagName,isPrerelease \
            -q '[.[] | select(.isPrerelease)] | .[0].tagName // empty')
          if [ -n "$BETA_TAG" ]; then
            for SLUG in $DEVICE_SLUGS; do
              mkdir -p "docs/.vitepress/dist/firmware/${SLUG}/beta"
              gh release download "$BETA_TAG" \
                --pattern "${SLUG}.manifest.json" \
                --dir "docs/.vitepress/dist/firmware/${SLUG}/beta/" || true
              if [ -f "docs/.vitepress/dist/firmware/${SLUG}/beta/${SLUG}.manifest.json" ]; then
                mv "docs/.vitepress/dist/firmware/${SLUG}/beta/${SLUG}.manifest.json" \
                   "docs/.vitepress/dist/firmware/${SLUG}/beta/manifest.json"
              fi
              gh release download "$BETA_TAG" \
                --pattern "${SLUG}.ota.bin" \
                --dir "docs/.vitepress/dist/firmware/${SLUG}/beta/" || true
            done
          fi

      - name: Verify firmware assets
        run: |
          for SLUG in $DEVICE_SLUGS; do
            MANIFEST="docs/.vitepress/dist/firmware/${SLUG}/manifest.json"
            if [ ! -f "$MANIFEST" ]; then
              echo "::warning::No firmware manifest found for ${SLUG} — install page will be non-functional"
            fi
          done

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
