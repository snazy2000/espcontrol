# =============================================================================
# BLUETOOTH PROXY - Optional Home Assistant Bluetooth proxy support
# =============================================================================
# The firmware includes BLE proxy support, but the BLE stack is disabled on boot.
# It only starts when Bluetooth Proxy is enabled.
# =============================================================================

esp32_ble:
  enable_on_boot: false

esp32_ble_tracker:
  scan_parameters:
    active: false

bluetooth_proxy:
  id: bluetooth_proxy_component
  active: false

esphome:
  on_boot:
    priority: -100
    then:
      - if:
          condition:
            switch.is_on: bluetooth_proxy_enabled
          then:
            - lambda: 'id(bluetooth_proxy_component).set_active(true);'
            - ble.enable:
          else:
            - lambda: 'id(bluetooth_proxy_component).set_active(false);'
            - ble.disable:

switch:
  - platform: template
    name: "Bluetooth Proxy"
    id: bluetooth_proxy_enabled
    internal: true
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:bluetooth"
    web_server:
      sorting_group_id: sg_connectivity
    on_turn_on:
      - lambda: 'id(bluetooth_proxy_component).set_active(true);'
      - ble.enable:
    on_turn_off:
      - lambda: 'id(bluetooth_proxy_component).set_active(false);'
      - ble.disable:
