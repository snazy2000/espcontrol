# =============================================================================
# CAMERA POPUP - Home Assistant camera snapshot overlay
# =============================================================================
# Pulls periodic JPEG snapshots from HA's camera proxy REST endpoint and shows
# them in a fullscreen top-layer popup. The popup is opened from C++ via
# camera_popup_open_script and closed by tapping the scrim or close button.
#
# Configuration (set in device web UI under Display settings):
#   Home Assistant URL: defaults to "http://homeassistant.local:8123"
#   (optional) ha_rest_token: long-lived access token in substitutions
#   camera_popup_resize: cap decode RAM; tune per device profile
#
# Include this package AFTER the device's lvgl package so the top_layer
# widget list appends correctly:
#   camera_popup: !include ../../common/addon/camera_popup.yaml
# =============================================================================

substitutions:
  ha_rest_token: ""
  camera_popup_resize: "400x400"

globals:
  - id: camera_popup_entity
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: camera_popup_refresh_ms
    type: uint32_t
    restore_value: false
    initial_value: '5000'
  - id: camera_popup_open_flag
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: camera_popup_last_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

online_image:
  - id: camera_popup_image
    url: "http://placeholder"
    format: JPEG
    type: RGB565
    update_interval: never
    resize: "${camera_popup_resize}"
    buffer_size: 262144
    timeout: 15s
    on_download_finished:
      - lvgl.image.update:
          id: camera_popup_img_widget
          src: camera_popup_image
    on_error:
      - logger.log:
          level: WARN
          tag: camera_popup
          format: "Camera snapshot download failed"
      - lambda: |-
          id(camera_popup_open_flag) = false;
          lv_label_set_text(id(camera_popup_img_widget), "Camera\nUnavailable");
          lv_obj_set_style_text_font(id(camera_popup_img_widget), id(label_font_sm)->get_lv_font(), LV_PART_MAIN);
          lv_obj_set_style_text_color(id(camera_popup_img_widget), lv_color_make(255, 100, 100), LV_PART_MAIN);

esphome:
  on_boot:
    - priority: 600
      then:
        - lambda: |-
            camera_popup_register_fn([](const std::string &entity, uint32_t refresh_ms) {
              id(camera_popup_entity) = entity;
              id(camera_popup_refresh_ms) = refresh_ms;
              id(camera_popup_open_script).execute();
            });

script:
  - id: camera_popup_open_script
    then:
      - lambda: |-
          if (id(camera_popup_entity).empty()) return;
          std::string url = id(ha_base_url).state + "/api/camera_proxy/" +
            id(camera_popup_entity) + "?t=" + std::to_string(millis());
          std::string token = "${ha_rest_token}";
          if (!token.empty()) url += "&access_token=" + token;
          id(camera_popup_image).set_url(url.c_str());
          id(camera_popup_open_flag) = true;
          id(camera_popup_last_ms) = millis();
      - lvgl.widget.show: camera_popup_overlay
      - component.update: camera_popup_image

  - id: camera_popup_close_script
    then:
      - lambda: id(camera_popup_open_flag) = false;
      - lvgl.widget.hide: camera_popup_overlay
      - online_image.release: camera_popup_image

interval:
  - interval: 1s
    then:
      - lambda: |-
          if (!id(camera_popup_open_flag)) return;
          uint32_t now_ms = millis();
          if (now_ms - id(camera_popup_last_ms) < id(camera_popup_refresh_ms)) return;
          id(camera_popup_last_ms) = now_ms;
          std::string url = id(ha_base_url).state + "/api/camera_proxy/" +
            id(camera_popup_entity) + "?t=" + std::to_string(now_ms);
          std::string token = "${ha_rest_token}";
          if (!token.empty()) url += "&access_token=" + token;
          id(camera_popup_image).set_url(url.c_str());
          id(camera_popup_image).update();

lvgl:
  top_layer:
    widgets:
      - obj:
          id: camera_popup_overlay
          hidden: true
          width: 100%
          height: 100%
          bg_color: 0x000000
          bg_opa: 80%
          border_width: 0
          pad_all: 0
          clickable: true
          on_click:
            - script.execute: camera_popup_close_script
          widgets:
            - image:
                id: camera_popup_img_widget
                src: camera_popup_image
                align: center
            - obj:
                id: camera_popup_close_btn
                width: 48
                height: 48
                align: top_right
                x: -8
                y: 8
                radius: 24
                bg_color: 0x333333
                bg_opa: 90%
                border_width: 0
                clickable: true
                on_click:
                  - script.execute: camera_popup_close_script
                widgets:
                  - label:
                      text: "\U000F0156"
                      align: center
                      text_color: 0xFFFFFF
