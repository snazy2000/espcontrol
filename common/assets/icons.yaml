# =============================================================================
# ICONS - Material Design Icons for buttons and setup screens
# =============================================================================
# http://materialdesignicons.com/cdn/7.4.47/
# Two icon fonts: button icons and setup icons.
# =============================================================================

font:
  # Button icons (52px)
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: icon_font
    size: 48
    bpp: 4
    glyphs: !include icon_glyphs.yaml

  # Setup screen icons (64px)
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: icon_font_setup
    size: 64
    bpp: 4
    glyphs:
      - "\U000F05A9"  # mdi-wifi
      - "\U000F0200"  # mdi-ethernet
      - "\U000F0493"  # mdi-cog
      - "\U000F07D0"  # mdi-home-assistant

substitutions:
  icon_wifi: "\U000F05A9"
  icon_ethernet: "\U000F0200"
  icon_cog: "\U000F0493"
  icon_home_assistant: "\U000F07D0"
  icon_chevron_left: "\U000F0141"
  icon_chevron_right: "\U000F0142"
