# =============================================================================
# CONFIG: BUTTON TEMPLATE (parameterized by ${num})
# =============================================================================
# Per-button config stored as a single semicolon-delimited string:
#   entity_id;label;icon;icon_on;sensor;sensor_unit;type;subpage_config
# Included once per button slot from packages.yaml with vars: { num: "N" }.
# =============================================================================

text:
  - platform: template
    name: "Button ${num} Config"
    internal: true
    id: button_${num}_config
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 500
    mode: text
    entity_category: config
    icon: "mdi:cog"
    update_interval: never
    web_server:
      sorting_group_id: sg_button
