# =============================================================================
# CONFIG: DISPLAY & SCREENSAVER
# =============================================================================
# User-configurable temperature entity bindings and screensaver settings.
# All values persist across reboots and are editable via the webserver v3 UI.
# =============================================================================

esphome:
  on_boot:
    # Apply restored clock-bar layout before subpages copy main-page padding.
    priority: -150
    then:
      - lambda: |-
          set_display_temperature_unit(id(temperature_unit_select).current_option(),
                                       id(timezone_select).current_option());
          set_display_temperature_degree_symbol(id(temperature_degree_symbol_enabled).state);
      - script.execute: clock_bar_apply

script:
  - id: clock_bar_apply
    mode: restart
    then:
      - lambda: |-
          bool enabled = id(clock_bar_enabled).state;
          lv_obj_set_style_pad_top(
            id(main_page)->obj,
            enabled ? ${main_page_pad_top} : ${main_page_compact_pad_top},
            LV_PART_MAIN);
          lv_obj_update_layout(id(main_page)->obj);

          if (!enabled) {
            lv_obj_add_flag(id(display_time), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(temperatures), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(network_status_button), LV_OBJ_FLAG_HIDDEN);
            network_status_hide_modal();
            return;
          }

          if (lv_scr_act() == id(main_page)->obj) {
            lv_obj_clear_flag(id(display_time), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(network_status_button), LV_OBJ_FLAG_HIDDEN);
          }
          id(network_status_refresh).execute();
          refresh_temp_label_values(id(temperatures), id(main_page)->obj,
                                    enabled,
                                    id(indoor_temp_enable).state,
                                    id(outdoor_temp_enable).state,
                                    id(indoor_temp), id(outdoor_temp));

switch:
  - platform: template
    name: "Screen: Clock Bar"
    internal: true
    id: clock_bar_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:clock-digital"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - script.execute: clock_bar_apply
    on_turn_off:
      - script.execute: clock_bar_apply

  - platform: template
    name: "Indoor Temp Enable"
    internal: true
    id: indoor_temp_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:home-thermometer"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - lambda: |-
          refresh_temp_label_values(id(temperatures), id(main_page)->obj,
                                    id(clock_bar_enabled).state,
                                    id(indoor_temp_enable).state,
                                    id(outdoor_temp_enable).state,
                                    id(indoor_temp), id(outdoor_temp));
    on_turn_off:
      - lambda: |-
          refresh_temp_label_values(id(temperatures), id(main_page)->obj,
                                    id(clock_bar_enabled).state,
                                    id(indoor_temp_enable).state,
                                    id(outdoor_temp_enable).state,
                                    id(indoor_temp), id(outdoor_temp));

  - platform: template
    name: "Outdoor Temp Enable"
    internal: true
    id: outdoor_temp_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:sun-thermometer"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - lambda: |-
          refresh_temp_label_values(id(temperatures), id(main_page)->obj,
                                    id(clock_bar_enabled).state,
                                    id(indoor_temp_enable).state,
                                    id(outdoor_temp_enable).state,
                                    id(indoor_temp), id(outdoor_temp));
    on_turn_off:
      - lambda: |-
          refresh_temp_label_values(id(temperatures), id(main_page)->obj,
                                    id(clock_bar_enabled).state,
                                    id(indoor_temp_enable).state,
                                    id(outdoor_temp_enable).state,
                                    id(indoor_temp), id(outdoor_temp));

  - platform: template
    name: "Screen: Temperature Degree Symbol"
    internal: true
    id: temperature_degree_symbol_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    icon: "mdi:temperature-celsius"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - lambda: |-
          set_display_temperature_degree_symbol(true);
          refresh_temp_label_values(id(temperatures), id(main_page)->obj,
                                    id(clock_bar_enabled).state,
                                    id(indoor_temp_enable).state,
                                    id(outdoor_temp_enable).state,
                                    id(indoor_temp), id(outdoor_temp));
    on_turn_off:
      - lambda: |-
          set_display_temperature_degree_symbol(false);
          refresh_temp_label_values(id(temperatures), id(main_page)->obj,
                                    id(clock_bar_enabled).state,
                                    id(indoor_temp_enable).state,
                                    id(outdoor_temp_enable).state,
                                    id(indoor_temp), id(outdoor_temp));

  - platform: template
    name: "Screen Saver: Clock"
    internal: true
    id: clock_screensaver_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:clock-outline"
    entity_category: config
    web_server:
      sorting_group_id: sg_screensaver
    on_turn_on:
      - if:
          condition:
            lambda: 'return !screensaver_action_clock_mode(id(screensaver_action).current_option());'
          then:
            - select.set:
                id: screensaver_action
                option: "Clock"
      - if:
          condition:
            lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
          then:
            - script.execute: screensaver_idle_check
    on_turn_off:
      - if:
          condition:
            lambda: 'return screensaver_action_clock_mode(id(screensaver_action).current_option());'
          then:
            - select.set:
                id: screensaver_action
                option: "Display Off"
      - if:
          condition:
            lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
          then:
            - script.execute: screensaver_idle_check

  - platform: template
    name: "Screen Saver: Media Player Sleep Prevention"
    internal: true
    id: media_player_sleep_prevention_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:speaker-play"
    entity_category: config
    web_server:
      sorting_group_id: sg_screensaver
    on_turn_on:
      - if:
          condition:
            lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
          then:
            - script.execute: screensaver_idle_check
    on_turn_off:
      - if:
          condition:
            lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
          then:
            - script.execute: screensaver_idle_check

select:
  - platform: template
    name: "Screen Saver: Action"
    internal: true
    id: screensaver_action
    entity_category: config
    icon: "mdi:monitor-shimmer"
    optimistic: true
    restore_value: true
    initial_option: "Display Off"
    options:
      - "Display Off"
      - "Screen Dimmed"
      - "Clock"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: |-
                return screensaver_action_clock_mode(id(screensaver_action).current_option()) &&
                       !id(clock_screensaver_enabled).state;
            then:
              - switch.turn_on: clock_screensaver_enabled
        - if:
            condition:
              lambda: |-
                return !screensaver_action_clock_mode(id(screensaver_action).current_option()) &&
                       id(clock_screensaver_enabled).state;
            then:
              - switch.turn_off: clock_screensaver_enabled
        - if:
            condition:
              lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
            then:
              - script.execute: screensaver_idle_check

  - platform: template
    name: "Screen: Temperature Unit"
    internal: true
    disabled_by_default: true
    id: temperature_unit_select
    entity_category: config
    icon: "mdi:temperature-celsius"
    optimistic: true
    restore_value: true
    initial_option: "Auto"
    options:
      - "Auto"
      - "°C"
      - "°F"
    web_server:
      sorting_group_id: sg_display
    on_value:
      then:
        - lambda: |-
            set_display_temperature_unit(id(temperature_unit_select).current_option(),
                                         id(timezone_select).current_option());
            refresh_temperature_unit_labels();
            refresh_temp_label_values(id(temperatures), id(main_page)->obj,
                                      id(clock_bar_enabled).state,
                                      id(indoor_temp_enable).state,
                                      id(outdoor_temp_enable).state,
                                      id(indoor_temp), id(outdoor_temp));

text:
  - platform: template
    name: "Indoor Temp Entity"
    internal: true
    id: indoor_temp_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:home-thermometer"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "Outdoor Temp Entity"
    internal: true
    id: outdoor_temp_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:sun-thermometer"
    update_interval: never
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "Screensaver Mode"
    internal: true
    id: screensaver_mode
    optimistic: true
    restore_value: true
    initial_value: "disabled"
    min_length: 0
    max_length: 10
    mode: text
    entity_category: config
    icon: "mdi:timer-cog-outline"
    update_interval: never
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
            then:
              - script.execute: screensaver_idle_check

  # Optional presence sensor for screensaver (e.g. mmWave)
  - platform: template
    name: "Presence Sensor Entity"
    internal: true
    id: presence_sensor_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:motion-sensor"
    update_interval: never
    web_server:
      sorting_group_id: sg_screensaver

  # Optional media player that keeps the screensaver awake while playing.
  - platform: template
    name: "Media Player Sleep Prevention Entity"
    internal: true
    id: media_player_sleep_prevention_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:speaker-play"
    update_interval: never
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
            then:
              - script.execute: screensaver_idle_check

number:
  - platform: template
    name: "Screen Saver: Daytime Clock Brightness"
    internal: true
    id: clock_brightness_day
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 35
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:brightness-7"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(is_clock_showing);'
            then:
              - script.execute: clock_screensaver_refresh_brightness

  - platform: template
    name: "Screen Saver: Nighttime Clock Brightness"
    internal: true
    id: clock_brightness_night
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 35
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:brightness-4"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(is_clock_showing);'
            then:
              - script.execute: clock_screensaver_refresh_brightness

  - platform: template
    name: "Screen Saver: Dimmed Brightness"
    internal: true
    id: screensaver_dimmed_brightness
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 10
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:brightness-4"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(screensaver_dimmed_active);'
            then:
              - script.execute: screensaver_dimmed_refresh_brightness

  # Legacy setting kept so existing panels can migrate their saved single
  # clock brightness into the new day/night settings, and so older cached web
  # UIs still change the live screensaver brightness.
  - platform: template
    name: "Screen Saver: Clock Brightness"
    internal: true
    id: clock_brightness
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 35
    restore_value: true
    optimistic: true
    unit_of_measurement: "%"
    entity_category: config
    icon: "mdi:clock-outline"
    on_value:
      then:
        - lambda: |-
            float legacy_pct = id(clock_brightness).state;
            if (std::isnan(legacy_pct) || legacy_pct <= 0.0f) legacy_pct = 35.0f;
            if (legacy_pct < 1.0f) legacy_pct = 1.0f;
            if (legacy_pct > 100.0f) legacy_pct = 100.0f;

            auto day_call = id(clock_brightness_day).make_call();
            day_call.set_value(legacy_pct);
            day_call.perform();

            auto night_call = id(clock_brightness_night).make_call();
            night_call.set_value(legacy_pct);
            night_call.perform();

  # Screensaver idle timeout
  - platform: template
    name: "Screensaver Timeout"
    internal: true
    id: screensaver_timeout
    min_value: 10
    max_value: 3600
    step: 10
    initial_value: 1800
    restore_value: true
    optimistic: true
    unit_of_measurement: "s"
    entity_category: config
    icon: "mdi:timer-outline"
    web_server:
      sorting_group_id: sg_screensaver
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(display_asleep) && lv_scr_act() == id(main_page)->obj;'
            then:
              - script.execute: screensaver_idle_check

  # Home screen return timeout (0 = disabled)
  - platform: template
    name: "Home Screen Timeout"
    internal: true
    id: home_screen_timeout
    min_value: 0
    max_value: 300
    step: 1
    initial_value: 60
    restore_value: true
    optimistic: true
    unit_of_measurement: "s"
    entity_category: config
    icon: "mdi:home-clock"
    web_server:
      sorting_group_id: sg_screensaver
