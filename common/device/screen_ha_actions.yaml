# =============================================================================
# SCREEN: HOME ASSISTANT ACTIONS
# =============================================================================
# Shown after the API client connects. Reminds the user to allow the device
# to perform Home Assistant actions. The user taps Done to continue.
# =============================================================================

lvgl:
  pages:
    - id: ha_actions_page
      bg_color: 0x000000
      scrollable: false
      pad_all: 0
      widgets:
        - obj:
            width: $screen_width
            height: $screen_height
            bg_opa: 0%
            border_width: 0
            pad_all: 0
            scrollable: false
            clickable: true
            on_press:
              then:
                - script.stop: setup_screen_dim
                - light.turn_on:
                    id: display_backlight
                    brightness: 90%
                - script.execute: setup_screen_dim
            widgets:
              - obj:
                  align: center
                  width: $content_width
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    flex_align_main: center
                    flex_align_cross: center
                    pad_row: 20
                  widgets:
                    - label:
                        text_font: icon_font_setup
                        text: $icon_home_assistant
                        text_color: 0xFFFFFF
                        text_align: center
                    - label:
                        text: "Home Assistant"
                        text_font: setup_title_font
                        text_color: 0xFFFFFF
                        width: $content_width
                        text_align: center
                    - label:
                        text: "Allow this device to perform\nHome Assistant actions"
                        text_font: setup_body_font
                        text_color: 0x888888
                        width: $content_width
                        text_align: center
                    - label:
                        text: "See the install guide for help"
                        text_font: setup_body_font
                        text_color: 0x555555
                        width: $content_width
                        text_align: center
                    - button:
                        width: 200
                        height: 56
                        bg_color: 0x333333
                        radius: 12
                        shadow_width: 0
                        on_click:
                          then:
                            - script.execute: navigate_after_api
                        widgets:
                          - label:
                              align: center
                              text: "Done"
                              text_font: setup_body_font
                              text_color: 0xFFFFFF
