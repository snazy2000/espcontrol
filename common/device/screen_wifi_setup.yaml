# =============================================================================
# SCREEN: WIFI SETUP
# =============================================================================
# Captive portal instructions shown when WiFi is disconnected.
# =============================================================================

lvgl:
  pages:
    - id: wifi_setup_page
      bg_color: 0x000000
      scrollable: false
      pad_all: 0
      widgets:
        - obj:
            width: $screen_width
            height: $screen_height
            bg_opa: 0%
            border_width: 0
            pad_all: 0
            scrollable: false
            clickable: true
            on_press:
              then:
                - script.stop: setup_screen_dim
                - light.turn_on:
                    id: display_backlight
                    brightness: 90%
                - script.execute: setup_screen_dim
            widgets:
              - obj:
                  align: center
                  width: $content_width
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    flex_align_main: center
                    flex_align_cross: center
                    pad_row: 20
                  widgets:
                    - label:
                        text_font: icon_font_setup
                        text: $icon_wifi
                        text_color: 0xFFFFFF
                        text_align: center
                    - label:
                        text: "WiFi Setup"
                        text_font: setup_title_font
                        text_color: 0xFFFFFF
                        width: $content_width
                        text_align: center
                    - label:
                        id: wifi_setup_instructions
                        text: "Connect to the WiFi hotspot\nto configure your network"
                        text_font: setup_body_font
                        text_color: 0x888888
                        width: $content_width
                        text_align: center
