# =============================================================================
# FONTS (DEVICE OVERRIDE) - Font variants for the 720x720 square display
# =============================================================================
# Supplements the common fonts with device-specific variants for the main UI.
# The screen is the same physical size as the 480x480 4-inch panel, but uses
# 1.5x pixel density, so these fonts scale the 4-inch square layout up.
# =============================================================================

font:
  # Button icons (66px, slightly reduced for the 720x720 square panel)
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: icon_font_md_square
    size: 66
    bpp: 4
    glyphs: !include ../../../common/assets/icon_glyphs.yaml

  # Button labels (31px)
  - file: "gfonts://Roboto"
    id: label_font_md_square
    size: 31
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Sensor value large number (reduced from 78px so sensor cards do not dominate)
  - file: "gfonts://Roboto@Light"
    id: statistics_font_md_square
    size: 66
    bpp: 4
    glyphs:
      - "0123456789.-°/%kWhVA "
      - ":"

  # Climate detail controls (chevron-left, dots-horizontal, minus, plus, thermometer)
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: climate_control_icon_font_md_square
    size: 63
    bpp: 4
    glyphs:
      - "\U000F0141"  # mdi-chevron-left
      - "\U000F01D8"  # mdi-dots-horizontal
      - "\U000F0374"  # mdi-minus
      - "\U000F0415"  # mdi-plus
      - "\U000F050F"  # mdi-thermometer

  # Climate detail page: oversized target temperature
  - file: "gfonts://Roboto@Light"
    id: climate_target_font_md_square
    size: 150
    bpp: 4
    glyphs:
      - "0123456789.-"

  # Top bar clock and temperature (28px)
  - file: "gfonts://Roboto"
    id: clockbar_font_md_square
    size: 28
    bpp: 4
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Setup screen icons (92px)
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: icon_font_setup_md_square
    size: 92
    bpp: 4
    glyphs:
      - "\U000F05A9"  # mdi-wifi
      - "\U000F0200"  # mdi-ethernet
      - "\U000F0493"  # mdi-cog
      - "\U000F07D0"  # mdi-home-assistant

  # Setup screen titles (56px)
  - file: "gfonts://Roboto@Light"
    id: setup_title_font_md_square
    size: 56
    bpp: 4
    glyphs: !include ../../../common/assets/setup_text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Setup screen body text (34px)
  - file: "gfonts://Roboto"
    id: setup_body_font_md_square
    size: 34
    bpp: 4
    glyphs: !include ../../../common/assets/setup_text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml
