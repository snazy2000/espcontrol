# =============================================================================
# DEVICE - Guition ESP32-P4 JC1060P470 hardware definition
# =============================================================================
# Pin assignments, peripherals, and platform config for the 7" touch panel.
# Includes the ESP32-P4 main SoC, ESP32-C6 hosted WiFi co-processor, MIPI
# DSI display, GT911 capacitive touchscreen, and backlight PWM.
# =============================================================================

# ---------------------------------------------------------------------------
# ESP32-P4 platform (16MB flash, ESP-IDF framework)
# ---------------------------------------------------------------------------
esp32:
  variant: esp32p4
  flash_size: 16MB
  cpu_frequency: 360MHZ
  engineering_sample: true
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true
      disable_vfs_support_termios: false
      disable_vfs_support_select: false
      disable_vfs_support_dir: false
    sdkconfig_options:
      CONFIG_SDMMC_HOST_DEFAULT: "y"
      CONFIG_COMPILER_OPTIMIZATION_SIZE: "y"
      CONFIG_FREERTOS_THREAD_LOCAL_STORAGE_POINTERS: "1"
      CONFIG_LOG_DEFAULT_LEVEL: "2"

# ---------------------------------------------------------------------------
# External component (sun_calc.h for on-device sunrise/sunset)
# ---------------------------------------------------------------------------
external_components:
  - source:
      type: git
      url: https://github.com/jtenniswood/espcontrol
      ref: main
      path: components
    components: [espcontrol]
    refresh: 0s

espcontrol:

# ---------------------------------------------------------------------------
# ESPHome core (device name from substitutions)
# ---------------------------------------------------------------------------
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags:
      - "-Wno-deprecated-declarations"
    build_src_flags:
      - "-Wno-literal-suffix"

# ---------------------------------------------------------------------------
# ESP32-C6 co-processor (provides WiFi/BLE via SDIO)
# ---------------------------------------------------------------------------
esp32_hosted:
  variant: esp32c6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

# ---------------------------------------------------------------------------
# PSRAM (video frame buffer memory)
# ---------------------------------------------------------------------------
psram:
  mode: hex
  speed: 200MHz

# ---------------------------------------------------------------------------
# OTA updates (ESPHome native + HTTP-based)
# ---------------------------------------------------------------------------
ota:
  - platform: esphome
  - platform: http_request

# ---------------------------------------------------------------------------
# Home Assistant API
# ---------------------------------------------------------------------------
api:
  reboot_timeout: 0s
  homeassistant_states: true

# ---------------------------------------------------------------------------
# Logging (light component silenced to WARN to reduce noise)
# ---------------------------------------------------------------------------
logger:
  logs:
    light: WARN

# ---------------------------------------------------------------------------
# HTTP client (used by firmware_update.yaml for OTA from GitHub)
# ---------------------------------------------------------------------------
http_request:
  id: http_req
  timeout: 10s

# ---------------------------------------------------------------------------
# Web server (v3 UI with custom JS and sorted config groups)
# ---------------------------------------------------------------------------
web_server:
  port: 80
  version: 3
  include_internal: true
  js_url: https://jtenniswood.github.io/espcontrol/webserver/${device_slug}/www.js
  sorting_groups:
    - id: sg_button
      name: "Button Configuration"
      sorting_weight: 10
    - id: sg_display
      name: "Display Configuration"
      sorting_weight: 20
    - id: sg_brightness
      name: "Brightness"
      sorting_weight: 25
    - id: sg_screensaver
      name: "Screensaver"
      sorting_weight: 30
    - id: sg_firmware
      name: "Firmware"
      sorting_weight: 40

# ---------------------------------------------------------------------------
# Restart button (triggers reboot to apply config changes)
# ---------------------------------------------------------------------------
button:
  - platform: restart
    name: "Apply Configuration"
    icon: mdi:restart
    entity_category: config

# ---------------------------------------------------------------------------
# Power management (LDO channels for DSI PHY and SD card)
# ---------------------------------------------------------------------------
esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V
    adjustable: True
  - channel: 4
    id: sd_card_power
    voltage: 2.7V
    adjustable: True

# ---------------------------------------------------------------------------
# Backlight (LEDC PWM output + monochromatic light entity)
# ---------------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO23
    id: gpio_backlight_pwm

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 0s
    gamma_correct: 1.0

# ---------------------------------------------------------------------------
# I2C bus and touchscreen (GT911 capacitive, wakes screensaver on touch)
# ---------------------------------------------------------------------------
i2c:
  - id: bus_a
    sda: GPIO07
    scl: GPIO08
    frequency: 400kHz
    sda_pullup_enabled: False
    scl_pullup_enabled: False

i2c_device:
  - id: i2cdev1
    address: 0x18
  - id: i2cdev2
    address: 0x32
  - id: i2cdev3
    address: 0x36
  - id: i2cdev4
    address: 0x40

touchscreen:
  - platform: gt911
    id: my_touchscreen
    i2c_id: bus_a
    reset_pin: GPIO22
    interrupt_pin: GPIO21
    on_touch:
      - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# Display (7" 1024x600 MIPI DSI panel)
# ---------------------------------------------------------------------------
display:
  - platform: mipi_dsi
    id: my_display
    model: JC1060P470
    color_order: RGB
    reset_pin:
      number: GPIO05
    rotation: 0
    update_interval: never
    auto_clear_enabled: false
