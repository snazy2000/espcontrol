# =============================================================================
# BUTTON WIDGET - Parameterized LVGL button (included per slot via ${num})
# =============================================================================
# Single button tile for the main page grid. Each button shows an icon (which
# can swap to a different icon or sensor value when the entity is on), a text
# label, and toggles its bound
# Home Assistant entity on press. Hidden by default; sensors.yaml unhides
# and positions active buttons at boot based on button_order.
# =============================================================================

button:
  id: button_${num}
  hidden: true
  styles: control
  widgets:
    # Icon (swaps to icon_on or hides for sensor overlay when entity is on)
    - label:
        text_font: $icon_font
        align: top_left
        id: button_${num}_icon_label
        text: $icon_cog
    # Sensor overlay (replaces icon when entity is on and sensor is configured)
    - obj:
        align: top_left
        id: button_${num}_sensor_container
        height: SIZE_CONTENT
        width: SIZE_CONTENT
        clickable: false
        layout:
          type: flex
          flex_flow: row
          flex_align_cross: end
        bg_opa: TRANSP
        border_width: 0
        pad_all: 0
        hidden: true
        widgets:
          - label:
              text_font: statistics_font
              text_color: $button_text_color
              id: button_${num}_sensor_label
              text: "--"
          - label:
              text_font: label_font_lg
              text_color: $button_text_color
              id: button_${num}_unit_label
              text: ""
              pad_bottom: 6
    # Entity name label (bottom of button, wraps to two lines)
    - label:
        align: bottom_left
        id: button_${num}_text_label
        text: "Configure"
        long_mode: wrap
        width: 100%
  # Navigate to subpage or toggle the bound HA entity on press
  on_short_click:
    - if:
        condition:
          lambda: 'return id(button_${num}_type).state == "subpage";'
        then:
          - lambda: |-
              lv_obj_t *sub_scr = (lv_obj_t *)lv_obj_get_user_data(id(button_${num}));
              if (sub_scr) {
                lv_scr_load_anim(sub_scr, LV_SCR_LOAD_ANIM_NONE, 0, 0, false);
              }
        else:
          - if:
              condition:
                lambda: 'return !id(button_${num}_entity).state.empty();'
              then:
                - homeassistant.action:
                    action: homeassistant.toggle
                    data_template:
                      entity_id: "{{ entity_id }}"
                    variables:
                      entity_id: !lambda 'return id(button_${num}_entity).state;'
