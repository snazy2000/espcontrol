# =============================================================================
# FONTS (DEVICE OVERRIDE) - Smaller fonts for the 480x480 square display
# =============================================================================
# Supplements the common fonts with smaller variants for the main UI.
# These _sm variants are referenced by the device theme, LVGL config, and
# setup screens.
# Hebrew glyphs are pulled from gfonts://Heebo via `extras`, since Roboto
# does not include the Hebrew block.
# =============================================================================

font:
  # Button icons (44px, proportional to 66px on the 720x720 square panel)
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: icon_font_sm
    size: 44
    bpp: 4
    glyphs: !include ../../../common/assets/icon_glyphs.yaml

  # Button labels (22px)
  - file: "gfonts://Roboto"
    id: label_font_sm
    size: 22
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Sensor value large number (44px, proportional to 66px on the 720x720 square panel)
  - file: "gfonts://Roboto@Light"
    id: statistics_font_sm
    size: 44
    bpp: 4
    glyphs:
      - "0123456789.-°/%kWhVA "
      - ":"

  # Media now-playing titles (sensor value size, full text glyph coverage)
  - file: "gfonts://Roboto@Light"
    id: media_title_font_sm
    size: 34
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Climate detail page: oversized target temperature
  - file: "gfonts://Roboto@Light"
    id: climate_target_font_sm
    size: 106
    bpp: 4
    glyphs:
      - "0123456789.-"

  # Top bar clock and temperature (20px)
  - file: "gfonts://Roboto"
    id: clockbar_font_sm
    size: 20
    bpp: 4
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Climate detail controls (42px, proportional to 63px on the 720x720 square panel)
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: climate_control_icon_font_sm
    size: 42
    bpp: 4
    glyphs:
      - "\U000F0141"  # mdi-chevron-left
      - "\U000F01D8"  # mdi-dots-horizontal
      - "\U000F0374"  # mdi-minus
      - "\U000F0415"  # mdi-plus
      - "\U000F050F"  # mdi-thermometer

  # Setup screen icons (61px, proportional to 92px on the 720x720 square panel)
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: icon_font_setup_sm
    size: 61
    bpp: 4
    glyphs:
      - "\U000F05A9"  # mdi-wifi
      - "\U000F0200"  # mdi-ethernet
      - "\U000F0493"  # mdi-cog
      - "\U000F07D0"  # mdi-home-assistant
