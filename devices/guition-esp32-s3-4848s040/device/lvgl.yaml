# =============================================================================
# LVGL MAIN PAGE - Top-layer HUD and button grid
# =============================================================================
# Defines the primary UI: a top-layer overlay with temperature and clock
# labels, and the main page containing a flex-wrap grid of 30 button widgets.
# Uses column_wrap for the 480x480 display with horizontal scrolling.
# Buttons start hidden; sensors.yaml unhides active ones at boot.
# =============================================================================

lvgl:
  # ---------------------------------------------------------------------------
  # Top layer (always visible above all pages)
  # ---------------------------------------------------------------------------
  top_layer:
    widgets:
      - obj:
          width: 100%
          height: SIZE_CONTENT
          bg_color: 0x000000
          bg_opa: cover
          pad_top: 6
          pad_bottom: 8
          pad_left: 8
          pad_right: 8
          border_width: 0
          widgets:
            # Indoor/outdoor temperature (left)
            - label:
                text: "-° / -°"
                id: temperatures
                text_font: clockbar_font
                align: left_mid
                text_color: 0xFFFFFF
                hidden: true
            # Clock (center, updated every minute by time.yaml)
            - label:
                text: "--:--"
                id: display_time
                text_font: clockbar_font
                align: center
                text_align: center
                text_color: 0xFFFFFF
                hidden: true

  # ---------------------------------------------------------------------------
  # Main page (flex-wrap grid of button widgets, horizontal scroll)
  # ---------------------------------------------------------------------------
  pages:
    - id: main_page
      scrollbar_mode: "off"
      scroll_elastic: true
      scroll_snap_x: CENTER
      layout:
        type: flex
        flex_flow: column_wrap
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 5
      pad_bottom: 5
      pad_left: 5
      pad_right: 5

      widgets:
        - !include { file: button_widget.yaml, vars: { num: "1" } }
        - !include { file: button_widget.yaml, vars: { num: "2" } }
        - !include { file: button_widget.yaml, vars: { num: "3" } }
        - !include { file: button_widget.yaml, vars: { num: "4" } }
        - !include { file: button_widget.yaml, vars: { num: "5" } }
        - !include { file: button_widget.yaml, vars: { num: "6" } }
        - !include { file: button_widget.yaml, vars: { num: "7" } }
        - !include { file: button_widget.yaml, vars: { num: "8" } }
        - !include { file: button_widget.yaml, vars: { num: "9" } }
        - !include { file: button_widget.yaml, vars: { num: "10" } }
        - !include { file: button_widget.yaml, vars: { num: "11" } }
        - !include { file: button_widget.yaml, vars: { num: "12" } }
        - !include { file: button_widget.yaml, vars: { num: "13" } }
        - !include { file: button_widget.yaml, vars: { num: "14" } }
        - !include { file: button_widget.yaml, vars: { num: "15" } }
