# =============================================================================
# CONFIG: SHARED BUTTON SETTINGS
# =============================================================================
# Shared on/off colors and button display order. Per-button entity, label,
# and icon are defined via button_template.yaml includes in package.yaml.
# =============================================================================

text:
  - platform: template
    name: "Button On Color"
    id: button_on_color
    optimistic: true
    restore_value: true
    initial_value: "FF8C00"
    min_length: 6
    max_length: 6
    mode: text
    entity_category: config
    icon: "mdi:palette"
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "Button Off Color"
    id: button_off_color
    optimistic: true
    restore_value: true
    initial_value: "313131"
    min_length: 6
    max_length: 6
    mode: text
    entity_category: config
    icon: "mdi:palette-outline"
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "Button Order"
    id: button_order
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 80
    mode: text
    entity_category: config
    icon: "mdi:order-numeric-ascending"
    web_server:
      sorting_group_id: sg_button
