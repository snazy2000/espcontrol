# =============================================================================
# CONFIG: BUTTON TEMPLATE (parameterized by ${num})
# =============================================================================
# Per-button entity binding, label, and icon. Included once per button slot
# from package.yaml with vars: { num: "N" }.
# =============================================================================

text:
  - platform: template
    name: "Button ${num} Entity"
    id: button_${num}_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:link-variant"
    web_server:
      sorting_group_id: sg_button

  - platform: template
    name: "Button ${num} Label"
    id: button_${num}_label
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 30
    mode: text
    entity_category: config
    icon: "mdi:label-outline"
    web_server:
      sorting_group_id: sg_button

select:
  - platform: template
    name: "Button ${num} Icon"
    id: button_${num}_icon
    optimistic: true
    restore_value: true
    initial_option: "Auto"
    options:
      - "Auto"
      - "Lightbulb"
      - "Power Plug"
      - "Fan"
      - "Lock"
      - "Garage"
      - "Blinds Open"
      - "Blinds Closed"
      - "Thermometer"
      - "Speaker"
      - "Television"
      - "Camera"
      - "Motion Sensor"
      - "Door"
      - "Window"
      - "Water Heater"
      - "Air Conditioner"
      - "Battery"
      - "LED Strip"
      - "Power"
    entity_category: config
    icon: "mdi:image-outline"
    web_server:
      sorting_group_id: sg_button
