# =============================================================================
# CONFIG: DISPLAY & SCREENSAVER
# =============================================================================
# User-configurable temperature entity bindings and screensaver settings.
# All values persist across reboots and are editable via the webserver v3 UI.
# =============================================================================

switch:
  - platform: template
    name: "Indoor Temp Enable"
    id: indoor_temp_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:home-thermometer"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - lambda: 'lv_obj_clear_flag(id(temperatures), LV_OBJ_FLAG_HIDDEN);'
    on_turn_off:
      - if:
          condition:
            switch.is_off: outdoor_temp_enable
          then:
            - lambda: 'lv_obj_add_flag(id(temperatures), LV_OBJ_FLAG_HIDDEN);'

  - platform: template
    name: "Outdoor Temp Enable"
    id: outdoor_temp_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:sun-thermometer"
    web_server:
      sorting_group_id: sg_display
    on_turn_on:
      - lambda: 'lv_obj_clear_flag(id(temperatures), LV_OBJ_FLAG_HIDDEN);'
    on_turn_off:
      - if:
          condition:
            switch.is_off: indoor_temp_enable
          then:
            - lambda: 'lv_obj_add_flag(id(temperatures), LV_OBJ_FLAG_HIDDEN);'

text:
  - platform: template
    name: "Indoor Temp Entity"
    id: indoor_temp_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:home-thermometer"
    web_server:
      sorting_group_id: sg_display

  - platform: template
    name: "Outdoor Temp Entity"
    id: outdoor_temp_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:sun-thermometer"
    web_server:
      sorting_group_id: sg_display

  # Optional presence sensor for screensaver (e.g. mmWave)
  - platform: template
    name: "Presence Sensor Entity"
    id: presence_sensor_entity
    optimistic: true
    restore_value: true
    initial_value: ""
    min_length: 0
    max_length: 100
    mode: text
    entity_category: config
    icon: "mdi:motion-sensor"
    web_server:
      sorting_group_id: sg_screensaver

number:
  # Screensaver idle timeout
  - platform: template
    name: "Screensaver Timeout"
    id: screensaver_timeout
    min_value: 30
    max_value: 1800
    step: 30
    initial_value: 300
    restore_value: true
    optimistic: true
    unit_of_measurement: "s"
    entity_category: config
    icon: "mdi:timer-outline"
    web_server:
      sorting_group_id: sg_screensaver
