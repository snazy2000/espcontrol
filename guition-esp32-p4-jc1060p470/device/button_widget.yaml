button:
  height: $button_height
  width: $button_width
  id: button_${num}
  hidden: true
  styles: control
  widgets:
    - label:
        text_font: $icon_font
        align: top_left
        id: button_${num}_icon_label
        text: $icon_cog
    - obj:
        align: top_left
        id: button_${num}_sensor_container
        height: SIZE_CONTENT
        width: SIZE_CONTENT
        clickable: false
        layout:
          type: flex
          flex_flow: row
          flex_align_cross: end
        bg_opa: TRANSP
        border_width: 0
        pad_all: 0
        hidden: true
        widgets:
          - label:
              text_font: statistics_font
              text_color: $button_text_color
              id: button_${num}_sensor_label
              text: "--"
          - label:
              text_font: label_font
              text_color: $button_text_color
              id: button_${num}_unit_label
              text: ""
              pad_bottom: 6
    - label:
        align: bottom_left
        id: button_${num}_text_label
        text: "Configure"
  on_press:
    - if:
        condition:
          lambda: 'return !id(button_${num}_entity).state.empty();'
        then:
          - homeassistant.action:
              action: homeassistant.toggle
              data_template:
                entity_id: "{{ entity_id }}"
              variables:
                entity_id: !lambda 'return id(button_${num}_entity).state;'
