# =============================================================================
# SENSORS - Dynamic HA entity subscriptions
# =============================================================================
# On boot, parses button_order to determine which buttons are active,
# shows/positions them on the LVGL display, and subscribes to Home
# Assistant state updates. Temperature and presence subscriptions follow.
# =============================================================================

globals:
  - id: indoor_temp
    type: float
    initial_value: 'NAN'
  - id: outdoor_temp
    type: float
    initial_value: 'NAN'

esphome:
  on_boot:
    - priority: -100
      then:
        - lambda: |-
            // --- Button slot descriptor ---
            struct BtnSlot {
              esphome::text::Text *entity;
              esphome::text::Text *label;
              esphome::select::Select *icon;
              esphome::text::Text *sensor;
              esphome::text::Text *sensor_unit;
              lv_obj_t *btn;
              lv_obj_t *icon_lbl;
              lv_obj_t *text_lbl;
              lv_obj_t *sensor_container;
              lv_obj_t *sensor_lbl;
              lv_obj_t *unit_lbl;
            };

            BtnSlot slots[] = {
              { id(button_1_entity),  id(button_1_label),  id(button_1_icon),  id(button_1_sensor),  id(button_1_sensor_unit),  id(button_1),  id(button_1_icon_label),  id(button_1_text_label),  id(button_1_sensor_container),  id(button_1_sensor_label),  id(button_1_unit_label) },
              { id(button_2_entity),  id(button_2_label),  id(button_2_icon),  id(button_2_sensor),  id(button_2_sensor_unit),  id(button_2),  id(button_2_icon_label),  id(button_2_text_label),  id(button_2_sensor_container),  id(button_2_sensor_label),  id(button_2_unit_label) },
              { id(button_3_entity),  id(button_3_label),  id(button_3_icon),  id(button_3_sensor),  id(button_3_sensor_unit),  id(button_3),  id(button_3_icon_label),  id(button_3_text_label),  id(button_3_sensor_container),  id(button_3_sensor_label),  id(button_3_unit_label) },
              { id(button_4_entity),  id(button_4_label),  id(button_4_icon),  id(button_4_sensor),  id(button_4_sensor_unit),  id(button_4),  id(button_4_icon_label),  id(button_4_text_label),  id(button_4_sensor_container),  id(button_4_sensor_label),  id(button_4_unit_label) },
              { id(button_5_entity),  id(button_5_label),  id(button_5_icon),  id(button_5_sensor),  id(button_5_sensor_unit),  id(button_5),  id(button_5_icon_label),  id(button_5_text_label),  id(button_5_sensor_container),  id(button_5_sensor_label),  id(button_5_unit_label) },
              { id(button_6_entity),  id(button_6_label),  id(button_6_icon),  id(button_6_sensor),  id(button_6_sensor_unit),  id(button_6),  id(button_6_icon_label),  id(button_6_text_label),  id(button_6_sensor_container),  id(button_6_sensor_label),  id(button_6_unit_label) },
              { id(button_7_entity),  id(button_7_label),  id(button_7_icon),  id(button_7_sensor),  id(button_7_sensor_unit),  id(button_7),  id(button_7_icon_label),  id(button_7_text_label),  id(button_7_sensor_container),  id(button_7_sensor_label),  id(button_7_unit_label) },
              { id(button_8_entity),  id(button_8_label),  id(button_8_icon),  id(button_8_sensor),  id(button_8_sensor_unit),  id(button_8),  id(button_8_icon_label),  id(button_8_text_label),  id(button_8_sensor_container),  id(button_8_sensor_label),  id(button_8_unit_label) },
              { id(button_9_entity),  id(button_9_label),  id(button_9_icon),  id(button_9_sensor),  id(button_9_sensor_unit),  id(button_9),  id(button_9_icon_label),  id(button_9_text_label),  id(button_9_sensor_container),  id(button_9_sensor_label),  id(button_9_unit_label) },
              { id(button_10_entity), id(button_10_label), id(button_10_icon), id(button_10_sensor), id(button_10_sensor_unit), id(button_10), id(button_10_icon_label), id(button_10_text_label), id(button_10_sensor_container), id(button_10_sensor_label), id(button_10_unit_label) },
              { id(button_11_entity), id(button_11_label), id(button_11_icon), id(button_11_sensor), id(button_11_sensor_unit), id(button_11), id(button_11_icon_label), id(button_11_text_label), id(button_11_sensor_container), id(button_11_sensor_label), id(button_11_unit_label) },
              { id(button_12_entity), id(button_12_label), id(button_12_icon), id(button_12_sensor), id(button_12_sensor_unit), id(button_12), id(button_12_icon_label), id(button_12_text_label), id(button_12_sensor_container), id(button_12_sensor_label), id(button_12_unit_label) },
              { id(button_13_entity), id(button_13_label), id(button_13_icon), id(button_13_sensor), id(button_13_sensor_unit), id(button_13), id(button_13_icon_label), id(button_13_text_label), id(button_13_sensor_container), id(button_13_sensor_label), id(button_13_unit_label) },
              { id(button_14_entity), id(button_14_label), id(button_14_icon), id(button_14_sensor), id(button_14_sensor_unit), id(button_14), id(button_14_icon_label), id(button_14_text_label), id(button_14_sensor_container), id(button_14_sensor_label), id(button_14_unit_label) },
              { id(button_15_entity), id(button_15_label), id(button_15_icon), id(button_15_sensor), id(button_15_sensor_unit), id(button_15), id(button_15_icon_label), id(button_15_text_label), id(button_15_sensor_container), id(button_15_sensor_label), id(button_15_unit_label) },
              { id(button_16_entity), id(button_16_label), id(button_16_icon), id(button_16_sensor), id(button_16_sensor_unit), id(button_16), id(button_16_icon_label), id(button_16_text_label), id(button_16_sensor_container), id(button_16_sensor_label), id(button_16_unit_label) },
              { id(button_17_entity), id(button_17_label), id(button_17_icon), id(button_17_sensor), id(button_17_sensor_unit), id(button_17), id(button_17_icon_label), id(button_17_text_label), id(button_17_sensor_container), id(button_17_sensor_label), id(button_17_unit_label) },
              { id(button_18_entity), id(button_18_label), id(button_18_icon), id(button_18_sensor), id(button_18_sensor_unit), id(button_18), id(button_18_icon_label), id(button_18_text_label), id(button_18_sensor_container), id(button_18_sensor_label), id(button_18_unit_label) },
              { id(button_19_entity), id(button_19_label), id(button_19_icon), id(button_19_sensor), id(button_19_sensor_unit), id(button_19), id(button_19_icon_label), id(button_19_text_label), id(button_19_sensor_container), id(button_19_sensor_label), id(button_19_unit_label) },
              { id(button_20_entity), id(button_20_label), id(button_20_icon), id(button_20_sensor), id(button_20_sensor_unit), id(button_20), id(button_20_icon_label), id(button_20_text_label), id(button_20_sensor_container), id(button_20_sensor_label), id(button_20_unit_label) },
            };
            constexpr int NUM_SLOTS = 20;

            // --- Parse button_order (comma-separated 1-indexed slot numbers) ---
            std::string order_str = id(button_order).state;
            std::vector<int> order;
            if (!order_str.empty()) {
              size_t start = 0, comma;
              while ((comma = order_str.find(',', start)) != std::string::npos) {
                int v = atoi(order_str.substr(start, comma - start).c_str());
                if (v >= 1 && v <= NUM_SLOTS) order.push_back(v);
                start = comma + 1;
              }
              int v = atoi(order_str.substr(start).c_str());
              if (v >= 1 && v <= NUM_SLOTS) order.push_back(v);
            }

            // --- Universal button colors ---
            std::string on_hex = id(button_on_color).state;
            std::string off_hex = id(button_off_color).state;
            uint32_t on_val = 0, off_val = 0;
            bool has_on = on_hex.length() == 6;
            bool has_off = off_hex.length() == 6;
            if (has_on) on_val = strtoul(on_hex.c_str(), nullptr, 16);
            if (has_off) off_val = strtoul(off_hex.c_str(), nullptr, 16);

            // --- Hide all buttons, then show active ones in order ---
            for (int i = 0; i < NUM_SLOTS; i++) {
              lv_obj_add_flag(slots[i].btn, LV_OBJ_FLAG_HIDDEN);
            }

            static const char* icon_codepoints[] = {
              "\U000F0493",  //  0: Auto (cog fallback)
              "\U000F0004",  //  1: Account
              "\U000F001B",  //  2: Air Conditioner
              "\U000F0D44",  //  3: Air Purifier
              "\U000F009E",  //  4: Alarm
              "\U000F078F",  //  5: Alarm Light
              "\U000F0079",  //  6: Battery
              "\U000F02E3",  //  7: Bed
              "\U000F009A",  //  8: Bell
              "\U000F1A2C",  //  9: Blinds Closed
              "\U000F1A2B",  // 10: Blinds Open
              "\U000F00AF",  // 11: Bluetooth
              "\U000F00E2",  // 12: Broom
              "\U000F0100",  // 13: Camera
              "\U000F0B6C",  // 14: Car Electric
              "\U000F0118",  // 15: Cast
              "\U000F07AE",  // 16: CCTV
              "\U000F1797",  // 17: Ceiling Fan
              "\U000F0769",  // 18: Ceiling Light
              "\U000F1793",  // 19: Chandelier
              "\U000F0150",  // 20: Clock
              "\U000F109F",  // 21: Coffee Maker
              "\U000F1846",  // 22: Curtains
              "\U000F1847",  // 23: Curtains Closed
              "\U000F095F",  // 24: Desk Lamp
              "\U000F0AAC",  // 25: Dishwasher
              "\U000F0A43",  // 26: Dog
              "\U000F081A",  // 27: Door
              "\U000F081C",  // 28: Door Open
              "\U000F0869",  // 29: Doorbell
              "\U000F0917",  // 30: Dryer
              "\U000F05F1",  // 31: EV Charger
              "\U000F0210",  // 32: Fan
              "\U000F0238",  // 33: Fire
              "\U000F0E2E",  // 34: Fireplace
              "\U000F0241",  // 35: Flash
              "\U000F08DD",  // 36: Floor Lamp
              "\U000F096B",  // 37: Fountain
              "\U000F0290",  // 38: Fridge
              "\U000F0297",  // 39: Gamepad
              "\U000F0372",  // 40: Garage
              "\U000F06DA",  // 41: Garage Open
              "\U000F0299",  // 42: Gate
              "\U000F116A",  // 43: Gate Open
              "\U000F02CB",  // 44: Headphones
              "\U000F0438",  // 45: Heater
              "\U000F02DC",  // 46: Home
              "\U000F0828",  // 47: Hot Tub
              "\U000F1099",  // 48: Humidifier
              "\U000F1824",  // 49: Iron
              "\U000F05FA",  // 50: Kettle
              "\U000F030B",  // 51: Key
              "\U000F06B5",  // 52: Lamp
              "\U000F11F7",  // 53: Lawnmower
              "\U000F032A",  // 54: Leaf
              "\U000F07D6",  // 55: LED Strip
              "\U000F097E",  // 56: Light Switch
              "\U000F0335",  // 57: Lightbulb
              "\U000F1253",  // 58: Lightbulb Group
              "\U000F033E",  // 59: Lock
              "\U000F06EE",  // 60: Mailbox
              "\U000F0C99",  // 61: Microwave
              "\U000F0379",  // 62: Monitor
              "\U000F0D91",  // 63: Motion Sensor
              "\U000F075A",  // 64: Music
              "\U000F1020",  // 65: Outdoor Lamp
              "\U000F04DE",  // 66: Oven
              "\U000F03D6",  // 67: Package
              "\U000F0606",  // 68: Pool
              "\U000F0425",  // 69: Power
              "\U000F0654",  // 70: Power Plug
              "\U000F042A",  // 71: Printer
              "\U000F042E",  // 72: Projector
              "\U000F070D",  // 73: Robot Vacuum
              "\U000F1A6B",  // 74: Roller Shade
              "\U000F1A6C",  // 75: Roller Shade Closed
              "\U000F0469",  // 76: Router
              "\U000F068A",  // 77: Security
              "\U000F09A1",  // 78: Shower
              "\U000F0392",  // 79: Smoke Detector
              "\U000F0717",  // 80: Snowflake
              "\U000F04B9",  // 81: Sofa
              "\U000F0D9B",  // 82: Solar Panel
              "\U000F04C3",  // 83: Speaker
              "\U000F04C9",  // 84: Spotlight
              "\U000F105F",  // 85: Sprinkler
              "\U000F12BA",  // 86: String Lights
              "\U000F05A8",  // 87: Sun
              "\U000F0502",  // 88: Television
              "\U000F050F",  // 89: Thermometer
              "\U000F0393",  // 90: Thermostat
              "\U000F051B",  // 91: Timer
              "\U000F09AB",  // 92: Toilet
              "\U000F0A79",  // 93: Trash Can
              "\U000F0427",  // 94: Wall Outlet
              "\U000F072A",  // 95: Washer
              "\U000F058C",  // 96: Water
              "\U000F0F92",  // 97: Water Heater
              "\U000F0595",  // 98: Weather
              "\U000F111C",  // 99: Window
            };

            static bool has_sensor[NUM_SLOTS] = {};

            int pos = 0;
            for (int idx : order) {
              auto &s = slots[idx - 1];
              lv_obj_clear_flag(s.btn, LV_OBJ_FLAG_HIDDEN);
              lv_obj_move_to_index(s.btn, pos++);

              // Apply colors
              if (has_on) {
                lv_obj_set_style_bg_color(s.btn, lv_color_hex(on_val),
                  static_cast<lv_style_selector_t>(LV_PART_MAIN) | static_cast<lv_style_selector_t>(LV_STATE_CHECKED));
              }
              if (has_off) {
                lv_obj_set_style_bg_color(s.btn, lv_color_hex(off_val),
                  static_cast<lv_style_selector_t>(LV_PART_MAIN) | static_cast<lv_style_selector_t>(LV_STATE_DEFAULT));
              }

              // Track whether this slot has a sensor-when-on entity
              std::string sensor_id = s.sensor->state;
              has_sensor[idx - 1] = !sensor_id.empty();

              // Subscribe to HA entity state
              std::string entity_id = s.entity->state;
              if (!entity_id.empty()) {
                // Label: custom or friendly_name fallback
                lv_obj_t *text_lbl = s.text_lbl;
                std::string custom_label = s.label->state;
                if (!custom_label.empty()) {
                  lv_label_set_text(text_lbl, custom_label.c_str());
                } else {
                  api::global_api_server->subscribe_home_assistant_state(
                    entity_id, std::string("friendly_name"),
                    std::function<void(const std::string &)>([text_lbl](const std::string &name) {
                      lv_label_set_text(text_lbl, name.c_str());
                    })
                  );
                }

                // Icon
                lv_obj_t *icon_lbl = s.icon_lbl;
                size_t icon_idx = s.icon->active_index().value_or(0);
                if (icon_idx == 0) {
                  std::string domain = entity_id.substr(0, entity_id.find('.'));
                  if (domain == "light")              icon_idx = 57;
                  else if (domain == "switch")        icon_idx = 70;
                  else if (domain == "fan")           icon_idx = 32;
                  else if (domain == "lock")          icon_idx = 59;
                  else if (domain == "cover")         icon_idx = 10;
                  else if (domain == "climate")       icon_idx = 2;
                  else if (domain == "media_player")  icon_idx = 83;
                  else if (domain == "camera")        icon_idx = 13;
                  else if (domain == "binary_sensor") icon_idx = 63;
                }
                lv_label_set_text(icon_lbl, icon_codepoints[icon_idx]);

                // Checked state subscription (with icon/sensor swap when sensor configured)
                lv_obj_t *btn_ptr = s.btn;
                lv_obj_t *sensor_lbl = s.sensor_lbl;
                bool *slot_has_sensor = &has_sensor[idx - 1];
                api::global_api_server->subscribe_home_assistant_state(
                  entity_id, {},
                  std::function<void(const std::string &)>([btn_ptr, icon_lbl, sensor_lbl, slot_has_sensor](const std::string &state) {
                    bool is_on = state == "on" || state == "open" || state == "playing" ||
                                 state == "home" || state == "unlocked";
                    if (is_on) {
                      lv_obj_add_state(btn_ptr, LV_STATE_CHECKED);
                    } else {
                      lv_obj_clear_state(btn_ptr, LV_STATE_CHECKED);
                    }
                    if (*slot_has_sensor) {
                      if (is_on) {
                        lv_obj_add_flag(icon_lbl, LV_OBJ_FLAG_HIDDEN);
                        lv_obj_clear_flag(sensor_lbl, LV_OBJ_FLAG_HIDDEN);
                      } else {
                        lv_obj_clear_flag(icon_lbl, LV_OBJ_FLAG_HIDDEN);
                        lv_obj_add_flag(sensor_lbl, LV_OBJ_FLAG_HIDDEN);
                      }
                    }
                  })
                );

                // Sensor value subscription
                if (has_sensor[idx - 1]) {
                  api::global_api_server->subscribe_home_assistant_state(
                    sensor_id, {},
                    std::function<void(const std::string &)>([sensor_lbl](const std::string &state) {
                      char *end;
                      float val = strtof(state.c_str(), &end);
                      if (end != state.c_str()) {
                        char buf[16];
                        snprintf(buf, sizeof(buf), "%.0f", val);
                        lv_label_set_text(sensor_lbl, buf);
                      } else {
                        lv_label_set_text(sensor_lbl, state.c_str());
                      }
                    })
                  );
                }
              }
            }

            // --- Temperature display ---
            bool indoor_on  = id(indoor_temp_enable).state;
            bool outdoor_on = id(outdoor_temp_enable).state;

            if (indoor_on && outdoor_on) {
              lv_label_set_text(id(temperatures), "-° / -°");
              lv_obj_clear_flag(id(temperatures), LV_OBJ_FLAG_HIDDEN);
            } else if (indoor_on || outdoor_on) {
              lv_label_set_text(id(temperatures), "-°");
              lv_obj_clear_flag(id(temperatures), LV_OBJ_FLAG_HIDDEN);
            }

            // --- Indoor temperature subscription ---
            if (indoor_on) {
              std::string indoor_id = id(indoor_temp_entity).state;
              if (!indoor_id.empty()) {
                api::global_api_server->subscribe_home_assistant_state(
                  indoor_id, {},
                  std::function<void(const std::string &)>([](const std::string &state) {
                    char *end;
                    float val = strtof(state.c_str(), &end);
                    if (end != state.c_str()) {
                      id(indoor_temp) = val;
                      float outdoor = id(outdoor_temp);
                      if (std::isnan(outdoor)) {
                        char buf[16];
                        snprintf(buf, sizeof(buf), "%.0f°", val);
                        lv_label_set_text(id(temperatures), buf);
                      } else {
                        char buf[16];
                        snprintf(buf, sizeof(buf), "%.0f° / %.0f°", outdoor, val);
                        lv_label_set_text(id(temperatures), buf);
                      }
                    }
                  })
                );
              }
            }

            // --- Outdoor temperature subscription ---
            if (outdoor_on) {
              std::string outdoor_id = id(outdoor_temp_entity).state;
              if (!outdoor_id.empty()) {
                api::global_api_server->subscribe_home_assistant_state(
                  outdoor_id, {},
                  std::function<void(const std::string &)>([](const std::string &state) {
                    char *end;
                    float val = strtof(state.c_str(), &end);
                    if (end != state.c_str()) {
                      id(outdoor_temp) = val;
                      float indoor = id(indoor_temp);
                      if (std::isnan(indoor)) {
                        char buf[16];
                        snprintf(buf, sizeof(buf), "%.0f°", val);
                        lv_label_set_text(id(temperatures), buf);
                      } else {
                        char buf[16];
                        snprintf(buf, sizeof(buf), "%.0f° / %.0f°", val, indoor);
                        lv_label_set_text(id(temperatures), buf);
                      }
                    }
                  })
                );
              }
            }

            // --- Presence sensor subscription ---
            std::string presence_id = id(presence_sensor_entity).state;
            if (!presence_id.empty()) {
              api::global_api_server->subscribe_home_assistant_state(
                presence_id, {},
                std::function<void(const std::string &)>([](const std::string &state) {
                  if (state == "on") {
                    lv_disp_trig_activity(NULL);
                    id(screensaver_wake).execute();
                  }
                })
              );
            }
