# =============================================================================
# SENSORS - Dynamic HA entity subscriptions
# =============================================================================
# On boot, reads configured entity_ids from text components and dynamically
# subscribes to Home Assistant state updates. Callbacks update LVGL widgets.
# =============================================================================

globals:
  - id: indoor_temp
    type: float
    initial_value: 'NAN'
  - id: outdoor_temp
    type: float
    initial_value: 'NAN'

esphome:
  on_boot:
    - priority: -100
      then:
        - lambda: |-
            // --- Universal button colors ---
            std::string on_hex = id(button_on_color).state;
            std::string off_hex = id(button_off_color).state;
            lv_obj_t *buttons[] = { id(button_1) };
            for (auto *btn : buttons) {
              if (on_hex.length() == 6) {
                uint32_t on_val = strtoul(on_hex.c_str(), nullptr, 16);
                lv_obj_set_style_bg_color(btn, lv_color_hex(on_val), static_cast<lv_style_selector_t>(LV_PART_MAIN) | static_cast<lv_style_selector_t>(LV_STATE_CHECKED));
              }
              if (off_hex.length() == 6) {
                uint32_t off_val = strtoul(off_hex.c_str(), nullptr, 16);
                lv_obj_set_style_bg_color(btn, lv_color_hex(off_val), static_cast<lv_style_selector_t>(LV_PART_MAIN) | static_cast<lv_style_selector_t>(LV_STATE_DEFAULT));
              }
            }

            // --- Button 1: entity state subscription ---
            std::string entity_id = id(button_1_entity).state;
            if (!entity_id.empty()) {
              // Set custom label if provided, otherwise subscribe to friendly_name
              std::string custom_label = id(button_1_label).state;
              if (!custom_label.empty()) {
                lv_label_set_text(id(button_1_text_label), custom_label.c_str());
              } else {
                api::global_api_server->subscribe_home_assistant_state(
                  entity_id, std::string("friendly_name"),
                  std::function<void(const std::string &)>([](const std::string &name) {
                    lv_label_set_text(id(button_1_text_label), name.c_str());
                  })
                );
              }

              // Icon codepoints indexed to match "Button: Icon" select options
              static const char* icon_codepoints[] = {
                "\U000F0493",  //  0: Auto (cog fallback)
                "\U000F0335",  //  1: Lightbulb
                "\U000F0654",  //  2: Power Plug
                "\U000F0210",  //  3: Fan
                "\U000F033E",  //  4: Lock
                "\U000F0372",  //  5: Garage
                "\U000F1011",  //  6: Blinds Open
                "\U000F00AC",  //  7: Blinds Closed
                "\U000F050F",  //  8: Thermometer
                "\U000F04C3",  //  9: Speaker
                "\U000F0502",  // 10: Television
                "\U000F0213",  // 11: Camera
                "\U000F0D91",  // 12: Motion Sensor
                "\U000F081A",  // 13: Door
                "\U000F111C",  // 14: Window
                "\U000F0F92",  // 15: Water Heater
                "\U000F0D43",  // 16: Air Conditioner
                "\U000F089E",  // 17: Battery
                "\U000F07D6",  // 18: LED Strip
                "\U000F0425",  // 19: Power
              };

              size_t i = id(button_1_icon).active_index().value_or(0);

              if (i == 0) {
                std::string domain = entity_id.substr(0, entity_id.find('.'));
                if (domain == "light")              i = 1;
                else if (domain == "switch")        i = 2;
                else if (domain == "fan")           i = 3;
                else if (domain == "lock")          i = 4;
                else if (domain == "cover")         i = 6;
                else if (domain == "climate")       i = 16;
                else if (domain == "media_player")  i = 9;
                else if (domain == "camera")        i = 11;
                else if (domain == "binary_sensor") i = 12;
              }

              lv_label_set_text(id(button_1_icon_label), icon_codepoints[i]);

              // Subscribe to entity state for checked/unchecked
              api::global_api_server->subscribe_home_assistant_state(
                entity_id, {},
                std::function<void(const std::string &)>([](const std::string &state) {
                  if (state == "on" || state == "open" || state == "playing" ||
                      state == "home" || state == "unlocked") {
                    lv_obj_add_state(id(button_1), LV_STATE_CHECKED);
                  } else {
                    lv_obj_clear_state(id(button_1), LV_STATE_CHECKED);
                  }
                })
              );
            }

            // --- Temperature display ---
            bool indoor_on  = id(indoor_temp_enable).state;
            bool outdoor_on = id(outdoor_temp_enable).state;

            if (indoor_on || outdoor_on) {
              lv_obj_clear_flag(id(temperatures), LV_OBJ_FLAG_HIDDEN);
            }

            // --- Indoor temperature subscription ---
            if (indoor_on) {
              std::string indoor_id = id(indoor_temp_entity).state;
              if (!indoor_id.empty()) {
                api::global_api_server->subscribe_home_assistant_state(
                  indoor_id, {},
                  std::function<void(const std::string &)>([](const std::string &state) {
                    char *end;
                    float val = strtof(state.c_str(), &end);
                    if (end != state.c_str()) {
                      id(indoor_temp) = val;
                      float outdoor = id(outdoor_temp);
                      if (std::isnan(outdoor)) {
                        char buf[16];
                        snprintf(buf, sizeof(buf), "%.0f°", val);
                        lv_label_set_text(id(temperatures), buf);
                      } else {
                        char buf[16];
                        snprintf(buf, sizeof(buf), "%.0f° / %.0f°", outdoor, val);
                        lv_label_set_text(id(temperatures), buf);
                      }
                    }
                  })
                );
              }
            }

            // --- Outdoor temperature subscription ---
            if (outdoor_on) {
              std::string outdoor_id = id(outdoor_temp_entity).state;
              if (!outdoor_id.empty()) {
                api::global_api_server->subscribe_home_assistant_state(
                  outdoor_id, {},
                  std::function<void(const std::string &)>([](const std::string &state) {
                    char *end;
                    float val = strtof(state.c_str(), &end);
                    if (end != state.c_str()) {
                      id(outdoor_temp) = val;
                      float indoor = id(indoor_temp);
                      if (std::isnan(indoor)) {
                        char buf[16];
                        snprintf(buf, sizeof(buf), "%.0f°", val);
                        lv_label_set_text(id(temperatures), buf);
                      } else {
                        char buf[16];
                        snprintf(buf, sizeof(buf), "%.0f° / %.0f°", val, indoor);
                        lv_label_set_text(id(temperatures), buf);
                      }
                    }
                  })
                );
              }
            }

            // --- Presence sensor subscription ---
            std::string presence_id = id(presence_sensor_entity).state;
            if (!presence_id.empty()) {
              api::global_api_server->subscribe_home_assistant_state(
                presence_id, {},
                std::function<void(const std::string &)>([](const std::string &state) {
                  if (state == "on") {
                    lv_disp_trig_activity(NULL);
                    id(display_backlight).turn_on().perform();
                    id(screensaver_idle_check).execute();
                  }
                })
              );
            }
